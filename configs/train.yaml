training:
  output_dir: "checkpoints"
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_seq_length: 2048
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 500
  eval_steps: 250
  fp16: false
  bf16: true
  report_to: "wandb"

wandb:
  project: "mllm-content-safety"
  run_name: null  # auto-generated if null
