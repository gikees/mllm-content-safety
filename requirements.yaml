# For remote GPU server (Linux + CUDA)
# Use: conda env create -f requirements.yaml
# Or just run: bash scripts/remote_setup.sh
name: mllm-content-safety
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch>=2.4.0
  - pytorch-cuda=12.4
  - torchvision>=0.19.0
  - pip
  - pip:
      - transformers>=4.48.0
      - datasets>=3.0.0
      - peft>=0.14.0
      - accelerate>=1.2.0
      - trl>=0.14.0
      - unsloth>=2025.3
      - pillow>=10.0.0
      - pyyaml>=6.0
      - scikit-learn>=1.5.0
      - wandb>=0.19.0
      - ruff
      - pytest
      - ipykernel
